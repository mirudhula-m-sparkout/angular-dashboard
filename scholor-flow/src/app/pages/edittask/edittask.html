<div class="page">

  <app-navbar></app-navbar>

  <div class="container" *ngIf="task as t; else loading">

    <p class="breadcrumb">Task List > Edit Task</p>

    <h1>Refine Your Focus.</h1>
    <p class="sub">Update the details of your assignment</p>

    <div class="layout">

      <div class="left">

        <label>Task Title</label>
        <input [(ngModel)]="t.title">

        <label>Description & Notes</label>
        <textarea [(ngModel)]="t.description"></textarea>

        <div class="row">
          <div>
            <label>Due Date</label>
            <input type="date" [(ngModel)]="t.dueDate">
          </div>

          <div>
            <label>Subject</label>
            <input placeholder="General">
          </div>
        </div>

        <div class="actions">
          <button class="save" (click)="updateTask()">Save Changes</button>
          <button class="cancel" routerLink="/tasks">Discard</button>
        </div>

      </div>

      <div class="right">

        <div class="box">
          <p class="title">Current Status</p>

          <select [(ngModel)]="t.status">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>

          <button class="mark" (click)="t.status='Completed'">
            ✔ Mark Complete
          </button>
        </div>

        <div class="box">
          <p class="title">Task Priority</p>

          <div class="priority">
            <div (click)="t.priority='High'" [class.active]="t.priority==='High'">High</div>
            <div (click)="t.priority='Medium'" [class.active]="t.priority==='Medium'">Medium</div>
            <div (click)="t.priority='Low'" [class.active]="t.priority==='Low'">Low</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <ng-template #loading>
    <p style="padding:20px;">Loading task...</p>
  </ng-template>

</div>

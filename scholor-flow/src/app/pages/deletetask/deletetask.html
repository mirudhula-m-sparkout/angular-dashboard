<div class="overlay">

  <div class="modal">

    <div class="icon">🗑</div>

    <h2>Delete Task?</h2>

    <p>
      Are you sure you want to delete this task? This action cannot be undone.
    </p>

    <div class="actions">
      <button (click)="cancel()">Cancel</button>
      <button class="delete" (click)="confirmDelete()">Delete</button>
    </div>

  </div>

</div>

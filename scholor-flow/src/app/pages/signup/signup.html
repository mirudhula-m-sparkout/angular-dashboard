<div class="container">
  <div class="card">

    <h2>ScholarFlow</h2>
    <p>Create Account</p>

    <form (ngSubmit)="signup()">

      <input type="text"
             placeholder="Username"
             [(ngModel)]="username"
             name="username"
             required>

      <input type="password"
             placeholder="Password"
             [(ngModel)]="password"
             name="password"
             required>

      <button type="submit">Sign Up</button>

    </form>

    <p class="link" (click)="goToLogin()">
      Back to Login
    </p>

  </div>
</div>
